<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long-horizon Task Breakdown UI</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="shell">
    <section class="panel panel-left">
      <header class="hero">
        <p class="eyebrow">Long-horizon Task Breakdown Planner</p>
        <h1>이미지와 프롬프트로 행동 계획을 생성합니다.</h1>
        <p class="subtitle">이미지를 넣고 로봇이 수행했으면 하는 명령을 작성한 뒤 실행하면, LLM에 요청을 보내 오른쪽 패널에 Partial Action List를 보여줍니다.</p>
      </header>

      <form id="plannerForm" class="planner-form" autocomplete="off">
        <section id="dropZone" class="drop-zone" aria-label="이미지 업로드 영역">
          <input id="imageInput" name="image" type="file" accept="image/*" hidden>
          <div class="drop-zone-inner">
            <div class="drop-zone-copy">
              <strong>이미지를 드래그 앤 드롭</strong>
              <span>또는 파일 첨부 버튼으로 선택하세요.</span>
            </div>
            <div class="drop-zone-actions">
              <button id="attachButton" type="button" class="secondary-button">File Attach</button>
              <span id="fileName" class="file-name">선택된 파일 없음</span>
            </div>
          </div>
        </section>

        <figure class="image-preview-card">
          <img id="imagePreview" alt="업로드된 이미지 미리보기" class="image-preview" src="static/img/placeholder.jpg" />
          <!-- <figcaption id="previewCaption">미리보기가 여기에 표시됩니다.</figcaption> -->
        </figure>

        <label class="field">
          <span>프롬프트</span>
          <textarea id="userPrompt" name="user_prompt" rows="8" placeholder="예: 책상 위의 물체들을 서랍에 넣고 닫아줘."></textarea>
        </label>

        <button id="runButton" type="submit" class="primary-button">실행</button>
      </form>
    </section>

    <aside class="panel panel-right">
      <div class="results-header">
        <p class="eyebrow">Partial Action List</p>
        <h2>실행 결과</h2>
      </div>

      <ul id="actionList" class="action-list">
        <li class="action-card placeholder">
          <strong>대기 중</strong>
          <p>이미지와 프롬프트를 입력하고 실행 버튼을 누르면 결과가 여기에 쌓입니다.</p>
        </li>
      </ul>
    </aside>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
